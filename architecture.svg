<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t  { font-size: 14px; font-weight: 400; fill: #3d3d3a; }
    .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
    .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }
    .arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
    /* Purple nodes */
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th  { fill: #3C3489; }
    .c-purple .ts  { fill: #534AB7; }
    /* Teal nodes */
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th  { fill: #085041; }
    .c-teal .ts  { fill: #0F6E56; }
    /* Amber nodes */
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th  { fill: #633806; }
    .c-amber .ts  { fill: #854F0B; }
    /* Gray nodes */
    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray .th  { fill: #444441; }
    .c-gray .ts  { fill: #5F5E5A; }
    /* Dividers */
    .divider { stroke: #c2c0b6; stroke-width: 0.5; stroke-dasharray: 4 4; }
    /* Section labels */
    .section { font-size: 11px; font-weight: 500; fill: #888780; letter-spacing: 0.04em; }
  </style>
</defs>

<!-- Title -->
<text style="font-size:15px;font-weight:500;fill:#3d3d3a;" x="340" y="32" text-anchor="middle" dominant-baseline="central">Iowa housing price predictor — solution architecture</text>

<!-- Section dividers -->
<line class="divider" x1="36" y1="148" x2="644" y2="148"/>
<line class="divider" x1="36" y1="273" x2="644" y2="273"/>
<line class="divider" x1="36" y1="408" x2="644" y2="408"/>
<line class="divider" x1="36" y1="522" x2="644" y2="522"/>

<!-- ── Section labels ── -->
<text class="section" x="36" y="52">TRAINING &amp; EXPORT</text>
<text class="section" x="36" y="166">DEPLOYMENT</text>
<text class="section" x="36" y="287">API ENDPOINTS</text>
<text class="section" x="36" y="420">MODEL &amp; MONITORING</text>
<text class="section" x="36" y="532">DRIFT REPORT INPUTS</text>

<!-- ── Row 1: Training ── -->
<g class="c-purple">
  <rect x="40" y="62" width="150" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="115" y="84" text-anchor="middle" dominant-baseline="central">Kaggle notebook</text>
  <text class="ts" x="115" y="102" text-anchor="middle" dominant-baseline="central">Train decision tree</text>
</g>

<line x1="190" y1="90" x2="238" y2="90" class="arr" marker-end="url(#arrow)" stroke="#73726c"/>

<g class="c-purple">
  <rect x="240" y="62" width="150" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="315" y="84" text-anchor="middle" dominant-baseline="central">joblib export</text>
  <text class="ts" x="315" y="102" text-anchor="middle" dominant-baseline="central">model.pkl artifact</text>
</g>

<line x1="390" y1="90" x2="438" y2="90" class="arr" marker-end="url(#arrow)" stroke="#73726c"/>

<g class="c-gray">
  <rect x="440" y="62" width="150" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="515" y="84" text-anchor="middle" dominant-baseline="central">GitHub</text>
  <text class="ts" x="515" y="102" text-anchor="middle" dominant-baseline="central">Source control</text>
</g>

<!-- ── Vertical arrow GitHub → Render ── -->
<line x1="515" y1="118" x2="515" y2="168" class="arr" marker-end="url(#arrow)" stroke="#73726c"/>
<text class="ts" x="526" y="148" dominant-baseline="central">push → deploy</text>

<!-- ── Row 2: Deployment ── -->
<g class="c-teal">
  <rect x="390" y="172" width="250" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="515" y="194" text-anchor="middle" dominant-baseline="central">Render (Docker)</text>
  <text class="ts" x="515" y="212" text-anchor="middle" dominant-baseline="central">Containerised FastAPI app</text>
</g>

<!-- ── Arrows Render → endpoints ── -->
<path d="M460 228L148 298" fill="none" class="arr" marker-end="url(#arrow)" stroke="#73726c"/>
<path d="M490 228L260 298" fill="none" class="arr" marker-end="url(#arrow)" stroke="#73726c"/>
<line x1="520" y1="228" x2="480" y2="298" class="arr" marker-end="url(#arrow)" stroke="#73726c"/>

<!-- ── Row 3: API Endpoints ── -->
<g class="c-gray">
  <rect x="36" y="300" width="112" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="92" y="322" text-anchor="middle" dominant-baseline="central">GET /docs</text>
  <text class="ts" x="92" y="340" text-anchor="middle" dominant-baseline="central">Swagger UI</text>
</g>

<g class="c-teal">
  <rect x="168" y="300" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="248" y="322" text-anchor="middle" dominant-baseline="central">POST /predict</text>
  <text class="ts" x="248" y="340" text-anchor="middle" dominant-baseline="central">JSON → price prediction</text>
</g>

<g class="c-amber">
  <rect x="400" y="300" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="480" y="322" text-anchor="middle" dominant-baseline="central">GET /report</text>
  <text class="ts" x="480" y="340" text-anchor="middle" dominant-baseline="central">HTML drift report</text>
</g>

<!-- ── Arrows endpoints → model/evidently ── -->
<line x1="248" y1="356" x2="248" y2="426" class="arr" marker-end="url(#arrow)" stroke="#73726c"/>
<line x1="480" y1="356" x2="480" y2="426" class="arr" marker-end="url(#arrow)" stroke="#73726c"/>

<!-- ── Row 4: Model & Monitoring ── -->
<g class="c-purple">
  <rect x="168" y="428" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="248" y="450" text-anchor="middle" dominant-baseline="central">model.pkl</text>
  <text class="ts" x="248" y="468" text-anchor="middle" dominant-baseline="central">Decision tree regressor</text>
</g>

<g class="c-amber">
  <rect x="380" y="428" width="210" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="485" y="450" text-anchor="middle" dominant-baseline="central">Evidently AI</text>
  <text class="ts" x="485" y="468" text-anchor="middle" dominant-baseline="central">Data drift detection</text>
</g>

<!-- ── Arrows Evidently → datasets ── -->
<path d="M440 484L248 538" fill="none" class="arr" marker-end="url(#arrow)" stroke="#73726c"/>
<line x1="520" y1="484" x2="520" y2="538" class="arr" marker-end="url(#arrow)" stroke="#73726c"/>

<!-- ── Row 5: Drift inputs ── -->
<g class="c-gray">
  <rect x="136" y="540" width="155" height="30" rx="6" stroke-width="0.5"/>
  <text class="ts" x="213" y="555" text-anchor="middle" dominant-baseline="central">Reference (training data)</text>
</g>

<g class="c-gray">
  <rect x="430" y="540" width="150" height="30" rx="6" stroke-width="0.5"/>
  <text class="ts" x="505" y="555" text-anchor="middle" dominant-baseline="central">Current (live data)</text>
</g>

</svg>
